version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cashflow-postgres
    environment:
      POSTGRES_DB: cashflow
      POSTGRES_USER: cashflow
      POSTGRES_PASSWORD: cashflow_secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cashflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cashflow-api:
    build: .
    container_name: cashflow-api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://cashflow:cashflow_secret@postgres:5432/cashflow
      - HOST=0.0.0.0
      - PORT=8000
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  cashflow-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: cashflow-bot
    depends_on:
      cashflow-api:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://cashflow:cashflow_secret@postgres:5432/cashflow
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
